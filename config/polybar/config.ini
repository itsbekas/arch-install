; Monokai Pro Octagon + Forest — Polybar config

[colors]
background = #282a3a
foreground = #eaf2f1
muted = #696d77
green = #7aa874
red = #ff657a
orange = #ff9b5e
yellow = #ffd76d
teal = #9cd1bb
purple = #c39ac9
bg-alt = #3b3d4b

[bar/main]
monitor = ${env:MONITOR:}
bottom = true
width = 100%
height = 24
fixed-center = true
dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

padding-left = 1
padding-right = 2
module-margin-left = 2
module-margin-right = 2

font-0 = Noto Sans:size=9;2
font-1 = Noto Sans:size=9:weight=bold;2

modules-left = i3
modules-center = spotify
modules-right = cpu memory cpu-temp gpu-temp filesystem date tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true

label-focused = %index%
label-focused-background = ${colors.bg-alt}
label-focused-underline = ${colors.green}
label-focused-padding = 2
label-focused-font = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding = 2

label-visible = %index%
label-visible-underline = ${colors.muted}
label-visible-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU: "
format-prefix-foreground = ${colors.teal}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 3
format-prefix = "RAM: "
format-prefix-foreground = ${colors.purple}
label = %percentage_used:2%%

[module/cpu-temp]
type = internal/temperature
interval = 3
hwmon-path = /sys/class/hwmon/hwmon3/temp1_input
base-temperature = 30
warn-temperature = 80

format-prefix = "CPU: "
format-prefix-foreground = ${colors.orange}
label = %temperature-c%

format-warn-prefix = "CPU: "
format-warn-prefix-foreground = ${colors.red}
label-warn = %temperature-c%
label-warn-foreground = ${colors.red}

[module/gpu-temp]
type = internal/temperature
interval = 3
hwmon-path = /sys/class/hwmon/hwmon1/temp1_input
base-temperature = 30
warn-temperature = 90

format-prefix = "GPU: "
format-prefix-foreground = ${colors.orange}
label = %temperature-c%

format-warn-prefix = "GPU: "
format-warn-prefix-foreground = ${colors.red}
label-warn = %temperature-c%
label-warn-foreground = ${colors.red}

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /

format-mounted-prefix = "Disk: "
format-mounted-prefix-foreground = ${colors.yellow}
label-mounted = %percentage_used%%

label-unmounted = %mountpoint% N/A
label-unmounted-foreground = ${colors.muted}

[module/date]
type = internal/date
interval = 1

date = %a %b %d
time = %H:%M

label = %date%  %time%
label-foreground = ${colors.foreground}

[module/tray]
type = internal/tray
tray-padding = 4px
tray-size = 65%

[module/spotify]
type = custom/script
exec = ~/.config/polybar/spotify.sh
tail = true
interval = 0
format-foreground = ${colors.green}

[settings]
screenchange-reload = true
pseudo-transparency = false
